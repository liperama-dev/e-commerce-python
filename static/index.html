<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise E-Commerce</title>
    <link rel="stylesheet" href="/static/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="glass-header">
        <div class="logo">E-Commerce App</div>
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="Search products...">
            <button onclick="searchProducts()">Search</button>
        </div>
        <nav>
            <button onclick="showSection('products')" class="nav-btn active">Shop</button>
            <button onclick="showSection('admin')" class="nav-btn">Admin</button>
            <button onclick="showSection('orders')" class="nav-btn">Orders</button>
        </nav>
    </header>

    <main class="container">
        <!-- Products Section -->
        <section id="products-section" class="active-section">
            <div class="section-header">
                <h2>Our Products</h2>
            </div>
            <div id="product-grid" class="product-grid">
                <!-- Products will be injected here -->
            </div>
        </section>

        <!-- Admin Section -->
        <section id="admin-section">
            <div class="section-header">
                <h2>Product Management</h2>
                <div>
                    <button onclick="flushDatabase()" class="btn-danger" style="margin-right: 0.5rem;">Flush Database</button>
                    <button onclick="openModal('productModal')" class="btn-primary">+ New Product</button>
                </div>
            </div>

            <!-- Draft Attention Banner -->
            <div id="draftsBanner" style="display:none; background: linear-gradient(135deg, rgba(239,68,68,0.15), rgba(239,68,68,0.05)); border: 1px solid rgba(239,68,68,0.4); border-radius: 10px; padding: 1rem 1.5rem; margin-bottom: 1.5rem; align-items: center; justify-content: space-between;">
                <div style="display: flex; align-items: center; gap: 0.75rem;">
                    <span style="font-size: 1.25rem;">&#9888;&#65039;</span>
                    <span id="draftsBannerText" style="font-weight: 500; color: #fca5a5;"></span>
                </div>
                <button onclick="activateDraftFilter()" class="btn-danger" style="font-size: 0.85rem; padding: 0.4rem 1rem;">Review Drafts</button>
            </div>
            
            <div class="admin-panel glass-panel" style="display: flex; justify-content: space-between; align-items: center;">
                <div>
                    <h3>Import Products</h3>
                    <div class="import-form">
                        <input type="file" id="csvFile" accept=".csv">
                        <button onclick="uploadCsv()" class="btn-secondary">Upload CSV</button>
                    </div>
                </div>
                <div style="display: flex; gap: 1rem; align-items: flex-end;">
                    <div>
                        <h3>Search</h3>
                        <input type="text" id="adminSearchInput" placeholder="Search by name, SKU, description..." oninput="loadAdminProducts()" style="width: 260px;">
                    </div>
                    <div>
                        <h3>Filter</h3>
                        <select id="adminFilter" onchange="loadAdminProducts()" style="padding: 0.5rem; background: rgba(15, 23, 42, 0.6); color: var(--text-primary); border: 1px solid var(--glass-border); border-radius: 8px;">
                            <option value="all">All Products</option>
                            <option value="drafts">Drafts (Needs Attention)</option>
                            <option value="published">Published</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="table-container glass-panel">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>SKU</th>
                            <th>Name</th>
                            <th>Category</th>
                            <th>Price</th>
                            <th>Stock</th>
                            <th>Weight</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="admin-product-list">
                        <!-- Admin product rows -->
                    </tbody>
                </table>
            </div>
        </section>

        <!-- Orders Section -->
        <section id="orders-section">
            <div class="section-header">
                <h2>Order History</h2>
                <button onclick="loadOrders()" class="btn-secondary">&#8635; Refresh</button>
            </div>
            <div class="table-container glass-panel">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Product</th>
                            <th>SKU</th>
                            <th>Qty</th>
                            <th>Unit Price</th>
                            <th>Total</th>
                            <th>Date</th>
                        </tr>
                    </thead>
                    <tbody id="orders-list">
                        <!-- Order rows injected here -->
                    </tbody>
                </table>
                <p id="orders-empty" style="display:none; text-align:center; color: var(--text-secondary); padding: 2rem;">No orders yet. Make a purchase from the Shop!</p>
            </div>
        </section>
    </main>

    <!-- Product Form Modal -->
    <div id="productModal" class="modal">
        <div class="modal-content glass-panel">
            <span class="close" onclick="closeModal('productModal')">&times;</span>
            <h2 id="modalTitle">Add Product</h2>
            <form id="productForm" onsubmit="saveProduct(event)">
                <input type="hidden" id="productId">
                <div class="form-group">
                    <label for="name">Name *</label>
                    <input type="text" id="name" required>
                </div>
                <div class="form-group">
                    <label for="sku">SKU *</label>
                    <input type="text" id="sku" required>
                </div>
                <div class="form-group">
                    <label for="category">Category</label>
                    <input type="text" id="category">
                </div>
                <div class="form-group">
                    <label for="price">Price</label>
                    <input type="number" step="0.01" min="0" id="price">
                </div>
                <div class="form-group">
                    <label for="stock">Stock</label>
                    <input type="number" min="0" id="stock">
                </div>
                <div class="form-group">
                    <label for="weight_kg">Weight (kg)</label>
                    <input type="number" step="0.01" min="0" id="weight_kg">
                </div>
                <div class="form-group full-width">
                    <label for="description">Description</label>
                    <textarea id="description" rows="3"></textarea>
                </div>
                <div class="form-actions full-width" style="display: flex; justify-content: space-between; align-items: center;">
                    <button type="button" id="publishToggleBtn" onclick="togglePublish()" style="display:none;"></button>
                    <button type="submit" class="btn-primary" style="margin-left: auto;">Save Product</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Purchase Modal -->
    <div id="purchaseModal" class="modal">
        <div class="modal-content glass-panel">
            <span class="close" onclick="closeModal('purchaseModal')">&times;</span>
            <h2>Checkout</h2>
            <div id="purchaseProductInfo" class="purchase-info"></div>
            
            <form id="purchaseForm" onsubmit="confirmPurchase(event)">
                <input type="hidden" id="purchaseProductId">
                
                <div class="payment-form">
                    <h3>Payment Details</h3>
                    <div class="form-group full-width">
                        <label for="ccName">Name on Card</label>
                        <input type="text" id="ccName" required>
                    </div>
                    <div class="form-group full-width">
                        <label for="ccNumber">Card Number</label>
                        <input type="text" id="ccNumber" placeholder="XXXX XXXX XXXX XXXX" required>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="ccExp">Expiry (MM/YY)</label>
                            <input type="text" id="ccExp" placeholder="MM/YY" required>
                        </div>
                        <div class="form-group">
                            <label for="ccCvc">CVC</label>
                            <input type="text" id="ccCvc" placeholder="XXX" required>
                        </div>
                    </div>
                    <div class="form-actions full-width" style="margin-top: 1rem; display: flex; justify-content: space-between; align-items: center;">
                        <button type="button" class="btn-secondary" onclick="autoFillPayment()">Auto-fill Info</button>
                        <button type="submit" class="btn-primary">Confirm Purchase</button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <script src="/static/app.js?v=6"></script>
</body>
</html>
