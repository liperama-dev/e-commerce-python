services:
  web:
    build: .
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=sqlite:////data/ecommerce.db
      - ADMIN_SECRET_KEY=${ADMIN_SECRET_KEY:-changeme}
    volumes:
      - sqlite_data:/data
    # Static files and CSV seeds are baked into the image (no bind-mount),
    # so we don't accidentally shadow the /app directory.

volumes:
  sqlite_data:
    driver: local
