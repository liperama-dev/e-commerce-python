# A generic, single database configuration.

[alembic]
# Path to migration scripts
script_location = alembic

# Template for new migration files
file_template = %%(rev)s_%%(slug)s

# Timezone for revision timestamps
timezone = UTC

# sys.path expansion so 'app' package is importable
prepend_sys_path = .

# SQLAlchemy connection string — overridden in env.py from app.config
sqlalchemy.url = sqlite:///./ecommerce.db

[post_write_hooks]
# hooks run after generating new revision scripts

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
